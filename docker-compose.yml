version: '3.8'

services:
  # FastAPI Backend
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://startdown:startdown_password@postgres:5432/startdown_db
      - SECRET_KEY=your-production-secret-key-change-this
      - ENVIRONMENT=production
      - DEBUG=false
      - ALLOWED_ORIGINS=http://localhost:3000,https://your-frontend-domain.com
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    networks:
      - startdown-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=startdown_db
      - POSTGRES_USER=startdown
      - POSTGRES_PASSWORD=startdown_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    networks:
      - startdown-network

  # Redis for Caching/Sessions
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - startdown-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
    networks:
      - startdown-network

  # Background Worker for Enrichment
  worker:
    build: .
    environment:
      - DATABASE_URL=postgresql://startdown:startdown_password@postgres:5432/startdown_db
      - SECRET_KEY=your-production-secret-key-change-this
      - ENVIRONMENT=production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    command: python -m app.workers.enrichment_worker
    networks:
      - startdown-network

volumes:
  postgres_data:
  redis_data:

networks:
  startdown-network:
    driver: bridge